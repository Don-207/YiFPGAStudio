name: Release Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Run hardware-free release gate
        env:
          YIFPGA_VIEWER_BROWSER: google-chrome
        run: just release-check
